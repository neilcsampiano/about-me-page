<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Website</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      text-align: center;
      background: #ffffff;
      color: #000;
      transition: 0.3s;
    }

    body.dark {
      background: #111;
      color: #fff;
    }

    .top-bar {
      margin-bottom: 15px;
    }

    .toggle {
      padding: 6px 10px;
      border: 1px solid #000;
      background: #fff;
      cursor: pointer;
      border-radius: 6px;
    }

    body.dark .toggle {
      background: #222;
      color: #fff;
      border-color: #fff;
    }

    .calculator {
      width: 300px;
      margin: auto;
      padding: 15px;
      border: 2px solid #000;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.15);
      background: #fff;
    }

    body.dark .calculator {
      background: #1e1e1e;
      border-color: #fff;
    }

    #display {
      width: 100%;
      height: 50px;
      font-size: 22px;
      text-align: right;
      margin-bottom: 10px;
      padding: 5px;
      border: 1px solid #000;
      border-radius: 6px;
      background: #fff;
    }

    body.dark #display {
      background: #000;
      color: #0f0;
      border-color: #fff;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    button {
      height: 45px;
      font-size: 18px;
      cursor: pointer;
      border: 1px solid #000;
      background: #fff;
      border-radius: 6px;
      box-shadow: 1px 1px 4px rgba(0,0,0,0.1);
    }

    button:hover {
      background: #000;
      color: #fff;
    }

    body.dark button {
      background: #222;
      color: #fff;
      border-color: #fff;
    }

    .equal {
      grid-column: span 2;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <button class="toggle" onclick="toggleMode()">Toggle Dark Mode</button>
  </div>

  <h2>Calculator</h2>

  <div class="calculator">
    <input type="text" id="display" value="0" readonly />

    <div class="buttons">
      <button onclick="clearDisplay()">C</button>
      <button onclick="add('/')">/</button>
      <button onclick="add('*')">*</button>
      <button onclick="add('-')">-</button>

      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button onclick="add('+')">+</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>

      <button onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    function add(val) {
      if (display.value === "0") display.value = val;
      else display.value += val;
    }

    function clearDisplay() {
      display.value = "0";
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }

    function toggleMode() {
      document.body.classList.toggle("dark");
    }

    document.addEventListener("keydown", function(e) {
      if (!isNaN(e.key) || ["+","-","*","/","."].includes(e.key)) {
        add(e.key);
      } else if (e.key === "Enter") {
        calculate();
      } else if (e.key === "Backspace") {
        display.value = display.value.slice(0, -1) || "0";
      } else if (e.key.toLowerCase() === "c") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
